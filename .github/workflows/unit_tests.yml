name: Unit Tests

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README*.md'
      - 'changelogs/**'
      - 'dashboard/**'
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run pytest suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Run tests
        run: |
          chmod +x scripts/run_pytests_ci.sh
          bash ./scripts/run_pytests_ci.sh ./tests

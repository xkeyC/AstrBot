openapi: 3.1.0
info:
  title: AstrBot OpenAPI v1
  version: 0.1.0
  description: >
    Target REST contract for migrating AstrBot HTTP APIs to /api/v1.
    Dynamic AstrBot configuration payloads are intentionally modeled as open
    JSON objects because their schemas are provided at runtime by template
    endpoints.
    Developer API keys currently support these scopes only: bot, provider,
    persona, im, config, chat, data, file, plugin, mcp, skill. The config scope also
    grants bot and provider access.
servers:
  - url: http://localhost:6185
    description: Local AstrBot server

security:
  - ApiKeyAuth: []

tags:
  - name: Open API
  - name: Auth
  - name: API Keys
  - name: System Config
  - name: Config Profiles
  - name: Bot Config Routes
  - name: Bots
  - name: Provider Sources
  - name: Providers
  - name: Chat
  - name: IM
  - name: Files
  - name: Plugins
  - name: Plugin Sources
  - name: Plugin Pages
  - name: Commands
  - name: Tools
  - name: MCP
  - name: Skills
  - name: Knowledge Base
  - name: Personas
  - name: Sessions
  - name: Conversations
  - name: Stats
  - name: Backups
  - name: Updates
  - name: Cron
  - name: Logs
  - name: T2I
  - name: Subagents
  - name: Webhooks

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login to the dashboard API
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout from the dashboard API
      operationId: logout
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/auth/setup-status:
    get:
      tags: [Auth]
      summary: Get first-run setup status
      operationId: getAuthSetupStatus
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/auth/setup:
    post:
      tags: [Auth]
      summary: Complete first-run dashboard account setup
      operationId: setupAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupAuthRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/auth/totp/setup:
    post:
      tags: [Auth]
      summary: Start or refresh TOTP setup
      operationId: setupTotp
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpSetupRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/auth/totp/recovery:
    post:
      tags: [Auth]
      summary: Generate or rotate TOTP recovery codes
      operationId: recoverTotp
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/auth/account:
    patch:
      tags: [Auth]
      summary: Update dashboard account credentials
      operationId: updateAuthAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List OpenAPI keys
      operationId: listApiKeys
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [API Keys]
      summary: Create an OpenAPI key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/api-keys/{key_id}/revoke:
    post:
      tags: [API Keys]
      summary: Revoke an OpenAPI key
      operationId: revokeApiKey
      parameters:
        - $ref: "#/components/parameters/KeyId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/api-keys/{key_id}:
    delete:
      tags: [API Keys]
      summary: Delete an OpenAPI key
      operationId: deleteApiKey
      parameters:
        - $ref: "#/components/parameters/KeyId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/system-config/schema:
    get:
      tags: [System Config]
      summary: Get the system configuration schema
      operationId: getSystemConfigSchema
      x-astrbot-scope: config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/system-config:
    get:
      tags: [System Config]
      summary: Get the system configuration
      operationId: getSystemConfig
      x-astrbot-scope: config
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [System Config]
      summary: Replace the system configuration
      operationId: updateSystemConfig
      x-astrbot-scope: config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DynamicConfig"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/system-config/runtime:
    get:
      tags: [System Config]
      summary: Get runtime-enriched system configuration metadata
      operationId: getSystemConfigRuntime
      x-astrbot-scope: config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/config-profiles/schema:
    get:
      tags: [Config Profiles]
      summary: Get the configuration profile schema
      operationId: getConfigProfileSchema
      x-astrbot-scope: config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/config-profiles:
    get:
      tags: [Config Profiles]
      summary: List configuration profiles
      operationId: listConfigProfiles
      x-astrbot-scope: config
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [Config Profiles]
      summary: Create a configuration profile
      operationId: createConfigProfile
      x-astrbot-scope: config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConfigProfileRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/config-profiles/{config_id}:
    get:
      tags: [Config Profiles]
      summary: Get a configuration profile
      operationId: getConfigProfile
      x-astrbot-scope: config
      parameters:
        - $ref: "#/components/parameters/ConfigId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Config Profiles]
      summary: Replace a configuration profile
      operationId: updateConfigProfileContent
      x-astrbot-scope: config
      parameters:
        - $ref: "#/components/parameters/ConfigId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DynamicConfig"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    patch:
      tags: [Config Profiles]
      summary: Rename a configuration profile
      operationId: renameConfigProfile
      x-astrbot-scope: config
      parameters:
        - $ref: "#/components/parameters/ConfigId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Config Profiles]
      summary: Delete a configuration profile
      operationId: deleteConfigProfile
      x-astrbot-scope: config
      parameters:
        - $ref: "#/components/parameters/ConfigId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/config-routes:
    get:
      tags: [Bot Config Routes]
      summary: List UMO to configuration profile bindings
      operationId: listConfigRoutes
      x-astrbot-scope: config
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Bot Config Routes]
      summary: Replace all UMO to configuration profile bindings
      operationId: replaceConfigRoutes
      x-astrbot-scope: config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigRoutesReplaceRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/config-routes/{umo}:
    put:
      tags: [Bot Config Routes]
      summary: Bind a UMO to a configuration profile
      operationId: upsertConfigRoute
      x-astrbot-scope: config
      parameters:
        - $ref: "#/components/parameters/Umo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigRouteUpsertRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Bot Config Routes]
      summary: Remove a UMO configuration profile binding
      operationId: deleteConfigRoute
      x-astrbot-scope: config
      parameters:
        - $ref: "#/components/parameters/Umo"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bot-types:
    get:
      tags: [Bots]
      summary: List configurable bot types and their schemas
      operationId: listBotTypes
      x-astrbot-scope: bot
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bot-types/{bot_type}/registration:
    post:
      tags: [Bots]
      summary: Run a bot type registration flow action
      operationId: registerBotType
      x-astrbot-scope: bot
      parameters:
        - name: bot_type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotRegistrationRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots:
    get:
      tags: [Bots]
      summary: List created bots and their configurations
      operationId: listBots
      x-astrbot-scope: bot
      parameters:
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [Bots]
      summary: Create a bot from configuration
      operationId: createBot
      x-astrbot-scope: bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/stats:
    get:
      tags: [Bots]
      summary: List runtime status for all bots
      operationId: listBotStats
      x-astrbot-scope: bot
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/by-id:
    get:
      tags: [Bots]
      summary: Get a bot configuration by query ID
      operationId: getBotById
      x-astrbot-scope: bot
      parameters:
        - name: bot_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Bots]
      summary: Replace a bot configuration by body ID
      operationId: updateBotById
      x-astrbot-scope: bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bot_id, config]
              properties:
                bot_id:
                  type: string
                config:
                  $ref: "#/components/schemas/DynamicConfig"
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Bots]
      summary: Delete a bot by query ID
      operationId: deleteBotById
      x-astrbot-scope: bot
      parameters:
        - name: bot_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/enabled:
    patch:
      tags: [Bots]
      summary: Enable or disable a bot by body ID
      operationId: setBotEnabledById
      x-astrbot-scope: bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bot_id, enabled]
              properties:
                bot_id:
                  type: string
                enabled:
                  type: boolean
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/test:
    post:
      tags: [Bots]
      summary: Test a bot registration or connection by body ID
      operationId: testBotById
      x-astrbot-scope: bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bot_id]
              properties:
                bot_id:
                  type: string
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/{bot_id}:
    get:
      tags: [Bots]
      summary: Get a bot configuration
      operationId: getBot
      x-astrbot-scope: bot
      parameters:
        - $ref: "#/components/parameters/BotId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Bots]
      summary: Replace a bot configuration
      operationId: updateBot
      x-astrbot-scope: bot
      parameters:
        - $ref: "#/components/parameters/BotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Bots]
      summary: Delete a bot
      operationId: deleteBot
      x-astrbot-scope: bot
      parameters:
        - $ref: "#/components/parameters/BotId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/{bot_id}/enabled:
    patch:
      tags: [Bots]
      summary: Enable or disable a bot
      operationId: setBotEnabled
      x-astrbot-scope: bot
      parameters:
        - $ref: "#/components/parameters/BotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledPatch"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/bots/{bot_id}/test:
    post:
      tags: [Bots]
      summary: Test a bot registration or connection
      operationId: testBot
      x-astrbot-scope: bot
      parameters:
        - $ref: "#/components/parameters/BotId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/providers/schema:
    get:
      tags: [Providers]
      summary: Get the overall provider configuration schema
      operationId: getProviderSchema
      x-astrbot-scope: provider
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources:
    get:
      tags: [Provider Sources]
      summary: List provider sources
      operationId: listProviderSources
      x-astrbot-scope: provider
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [Provider Sources]
      summary: Create a provider source
      operationId: createProviderSource
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderSourceConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources/by-id:
    get:
      tags: [Provider Sources]
      summary: Get a provider source by query ID
      operationId: getProviderSourceById
      x-astrbot-scope: provider
      parameters:
        - name: source_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Provider Sources]
      summary: Update a provider source by body ID
      operationId: upsertProviderSourceById
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id, config]
              properties:
                source_id:
                  type: string
                config:
                  $ref: "#/components/schemas/DynamicConfig"
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Provider Sources]
      summary: Delete a provider source by query ID
      operationId: deleteProviderSourceById
      x-astrbot-scope: provider
      parameters:
        - name: source_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources/models:
    get:
      tags: [Provider Sources]
      summary: List models available from a provider source by query ID
      operationId: listProviderSourceModelsById
      x-astrbot-scope: provider
      parameters:
        - name: source_id
          in: query
          required: true
          schema:
            type: string
        - name: capability
          in: query
          schema:
            $ref: "#/components/schemas/ProviderCapability"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources/providers:
    get:
      tags: [Providers]
      summary: List providers under a provider source by query ID
      operationId: listProvidersBySourceId
      x-astrbot-scope: provider
      parameters:
        - name: source_id
          in: query
          required: true
          schema:
            type: string
        - name: capability
          in: query
          schema:
            $ref: "#/components/schemas/ProviderCapability"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [Providers]
      summary: Create a provider under a provider source by body ID
      operationId: createProviderInSourceById
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id, config]
              properties:
                source_id:
                  type: string
                config:
                  $ref: "#/components/schemas/DynamicConfig"
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources/{source_id}:
    get:
      tags: [Provider Sources]
      summary: Get a provider source
      operationId: getProviderSource
      x-astrbot-scope: provider
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Provider Sources]
      summary: Update a provider source or create it if missing
      operationId: upsertProviderSource
      x-astrbot-scope: provider
      parameters:
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderSourceConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Provider Sources]
      summary: Delete a provider source and providers that reference it
      operationId: deleteProviderSource
      x-astrbot-scope: provider
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources/{source_id}/models:
    get:
      tags: [Provider Sources]
      summary: List models available from a provider source
      operationId: listProviderSourceModels
      x-astrbot-scope: provider
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - name: capability
          in: query
          schema:
            $ref: "#/components/schemas/ProviderCapability"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/provider-sources/{source_id}/providers:
    get:
      tags: [Providers]
      summary: List providers under a provider source
      operationId: listProvidersBySource
      x-astrbot-scope: provider
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - name: capability
          in: query
          schema:
            $ref: "#/components/schemas/ProviderCapability"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [Providers]
      summary: Create a provider under a provider source
      operationId: createProviderInSource
      x-astrbot-scope: provider
      parameters:
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/providers:
    get:
      tags: [Providers]
      summary: List providers by capability or source
      operationId: listProviders
      x-astrbot-scope: provider
      parameters:
        - name: capability
          in: query
          schema:
            $ref: "#/components/schemas/ProviderCapability"
        - name: source_id
          in: query
          schema:
            type: string
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      tags: [Providers]
      summary: Create a standalone provider
      operationId: createProvider
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/providers/by-id:
    get:
      tags: [Providers]
      summary: Get a provider configuration by query ID
      operationId: getProviderById
      x-astrbot-scope: provider
      parameters:
        - name: provider_id
          in: query
          required: true
          schema:
            type: string
        - name: merged
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    put:
      tags: [Providers]
      summary: Replace a provider configuration by body ID
      operationId: updateProviderById
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_id, config]
              properties:
                provider_id:
                  type: string
                config:
                  $ref: "#/components/schemas/DynamicConfig"
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Providers]
      summary: Delete a provider by query ID
      operationId: deleteProviderById
      x-astrbot-scope: provider
      parameters:
        - name: provider_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/providers/enabled:
    patch:
      tags: [Providers]
      summary: Enable or disable a provider by body ID
      operationId: setProviderEnabledById
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_id, enabled]
              properties:
                provider_id:
                  type: string
                enabled:
                  type: boolean
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/providers/test:
    post:
      tags: [Providers]
      summary: Test a provider by body ID
      operationId: testProviderById
      x-astrbot-scope: provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_id]
              properties:
                provider_id:
                  type: string
              additionalProperties: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/providers/embedding-dimension:

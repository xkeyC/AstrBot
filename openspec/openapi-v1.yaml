components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Ok:
      description: Standard AstrBot success response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessEnvelope"
    Error:
      description: Standard AstrBot error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Text:
      description: Text response
      content:
        text/plain:
          schema:
            type: string
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessEnvelope"
    Html:
      description: HTML response
      content:
        text/html:
          schema:
            type: string

  parameters:
    AttachmentId:
      name: attachment_id
      in: path
      required: true
      schema:
        type: string
    AttachmentIdQuery:
      name: attachment_id
      in: query
      required: true
      schema:
        type: string
    BotId:
      name: bot_id
      in: path
      required: true
      schema:
        type: string
    ChunkId:
      name: chunk_id
      in: path
      required: true
      schema:
        type: string
    CommandId:
      name: command_id
      in: path
      required: true
      description: URL-encoded command handler full name.
      schema:
        type: string
    ConfigId:
      name: config_id
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: string
    FilePath:
      name: file_path
      in: path
      required: true
      description: URL-encoded relative file path.
      schema:
        type: string
    Filename:
      name: filename
      in: path
      required: true
      schema:
        type: string
    FolderId:
      name: folder_id
      in: path
      required: true
